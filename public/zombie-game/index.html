<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Zombie Survival</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Press Start 2P', monospace;
    }

    /* ── Title screen ────────────────────────────────────────────────────────── */
    #title-screen {
      position: absolute; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 40%, #0a1a0a 0%, #000 100%);
      z-index: 10;
    }

    #title-screen h1 {
      font-size: clamp(18px, 4vw, 42px);
      color: #3dff7a;
      text-shadow: 0 0 20px #3dff7a88, 0 0 40px #3dff7a44;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    #title-screen .subtitle {
      font-size: clamp(7px, 1.4vw, 13px);
      color: #4a6a4a;
      margin-bottom: 48px;
      letter-spacing: 4px;
    }

    .btn-row {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .menu-btn {
      padding: 14px 28px;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(8px, 1.5vw, 12px);
      border: 2px solid;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: transform 0.1s, box-shadow 0.1s;
      text-decoration: none;
      display: inline-block;
    }
    .menu-btn:hover { transform: scale(1.05); }
    .menu-btn:active { transform: scale(0.97); }

    .btn-play {
      background: #1a3d1a;
      color: #3dff7a;
      border-color: #3dff7a;
      box-shadow: 0 0 12px #3dff7a44;
    }
    .btn-play:hover { box-shadow: 0 0 24px #3dff7a88; }

    .btn-avatar {
      background: #1a1a3d;
      color: #7ab8ff;
      border-color: #7ab8ff;
      box-shadow: 0 0 12px #7ab8ff44;
    }
    .btn-avatar:hover { box-shadow: 0 0 24px #7ab8ff88; }

    .btn-fs {
      background: #1a1a1a;
      color: #888;
      border-color: #444;
    }
    .btn-fs:hover { color: #aaa; border-color: #666; }

    .hint {
      margin-top: 40px;
      font-size: clamp(6px, 1vw, 9px);
      color: #2a3a2a;
      text-align: center;
      line-height: 2;
    }

    /* Zombie silhouette decoration */
    .title-zombies {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 120px;
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      pointer-events: none;
      opacity: 0.18;
    }
    .zil {
      width: 28px; background: #1a2e1a;
      border-radius: 6px 6px 0 0;
    }

    /* ── Game canvas ─────────────────────────────────────────────────────────── */
    #gameCanvas {
      display: none;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>

  <!-- Title screen -->
  <div id="title-screen">
    <h1>☣ ZOMBIE SURVIVAL</h1>
    <div class="subtitle">DEFEND THE HOUSE · SURVIVE 3 MINUTES</div>

    <div class="btn-row">
      <button class="menu-btn btn-play" onclick="startGame()">▶ PLAY</button>
      <a class="menu-btn btn-avatar" href="avatar.html">🧒 SURVIVOR</a>
      <button class="menu-btn btn-fs"   onclick="toggleFullscreen()">⛶ FULLSCREEN</button>
    </div>

    <div class="hint">
      WASD / ARROWS — move &nbsp;|&nbsp; E — attack &nbsp;|&nbsp; SPACE — repair<br>
      CLICK — attack &nbsp;|&nbsp; F — fullscreen &nbsp;|&nbsp; M — mute
    </div>

    <!-- decorative zombie silhouettes along the bottom -->
    <div class="title-zombies">
      <div class="zil" style="height:68px"></div>
      <div class="zil" style="height:55px"></div>
      <div class="zil" style="height:80px"></div>
      <div class="zil" style="height:50px"></div>
      <div class="zil" style="height:72px"></div>
      <div class="zil" style="height:44px"></div>
      <div class="zil" style="height:65px"></div>
      <div class="zil" style="height:58px"></div>
      <div class="zil" style="height:78px"></div>
      <div class="zil" style="height:46px"></div>
      <div class="zil" style="height:60px"></div>
      <div class="zil" style="height:52px"></div>
    </div>
  </div>

  <!-- Game canvas (hidden until Play is pressed) -->
  <canvas id="gameCanvas"></canvas>

  <script type="module" src="game/main.js"></script>
</body>
</html>
